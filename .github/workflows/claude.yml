name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');

            execSync(`git fetch origin ${context.payload.pull_request.base.ref}`);
            const diff = execSync(
              `git diff origin/${context.payload.pull_request.base.ref}...HEAD`
            ).toString();

            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '';

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 4096,
                messages: [
                  {
                    role: 'user',
                    content: [
                      'You are a senior software engineer reviewing a pull request.',
                      'Be concise and constructive. Focus on bugs, security issues, logic errors,',
                      'and meaningful improvements. Skip minor style nits unless they affect readability.\n',
                      `PR Title: ${prTitle}`,
                      `PR Description: ${prBody}\n`,
                      'Diff:',
                      '```',
                      diff.slice(0, 50000),
                      '```\n',
                      'Provide your review in this format:',
                      '## Claude Code Review\n',
                      '### Summary',
                      'A 1-2 sentence overview of what this PR does.\n',
                      '### Issues',
                      'List any bugs, security concerns, or logic errors. If none, say "No issues found."\n',
                      '### Suggestions',
                      'Optional improvements worth considering. Keep it brief.\n',
                      '### Verdict',
                      'One of: ✅ Looks good | ⚠️ Minor concerns | ❌ Needs changes',
                    ].join('\n'),
                  },
                ],
              }),
            });

            const data = await response.json();

            if (!response.ok) {
              core.setFailed(`Anthropic API error: ${JSON.stringify(data)}`);
              return;
            }

            const reviewComment = data.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: reviewComment,
            });

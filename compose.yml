version: '3.9'

services:

  db:
    image: imresamu/postgis-arm64:17-3.6-alpine 
    restart: always
    ports: 
      - 5455:5432
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events2
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: